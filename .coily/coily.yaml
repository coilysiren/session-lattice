# Per-repo command allowlist for session-lattice. The harness denies bare
# `uv:*` and `make:*` invocations; dev verbs route through coily so each
# call lands in the audit log.

commands:
  sync:
    run: make sync
    description: uv sync the workspace.
  lint:
    run: make lint
    description: Run ruff + mypy.
  fmt:
    run: make fmt
    description: Format with ruff.
  test:
    run: make test
    description: Run pytest. (No tests yet; placeholder until first view lands.)
  stack-up:
    run: make stack-up
    description: Bring up the local Feldera pipeline-manager (port 8080).
  stack-down:
    run: make stack-down
    description: Stop the Feldera container. Ephemeral state still in the container until stack-wipe.
  stack-status:
    run: make stack-status
    description: docker compose ps + healthz probe.
  stack-logs:
    run: make stack-logs
    description: Tail Feldera logs.
  stack-wipe:
    run: make stack-wipe
    description: Stop and remove the Feldera container plus its volumes.

# Catalog metadata for the cross-repo knowledge graph.
# Schema: coilysiren/agentic-os-kai#420 (tracker).
catalog:
  kind: Component
  type: service
  system: observability
  owner: kai
  lifecycle: experimental
  description: "Materialized-view service over Claude session data. Pulls from repo-recall, maintains views via Feldera, serves over HTTP to luca."
  dependsOn:
    - coilysiren/repo-recall
  providesApis:
    - session-lattice-views
