# Local Feldera pipeline-manager. Single service. Ephemeral state.
# Persistence is a follow-up; see docs/decisions.md.
#
# Version pinned for reproducibility. Bump deliberately, not via :latest.

services:
  feldera:
    image: images.feldera.com/feldera/pipeline-manager:0.296.0
    container_name: session-lattice-feldera
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      RUST_LOG: info
      RUST_BACKTRACE: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped
