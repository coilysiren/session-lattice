# Local Feldera pipeline-manager. Single service. Ephemeral state.
# Persistence is a follow-up; see docs/decisions.md.
#
# Feldera only publishes a :latest tag (no versioned tags as of 2026-05-14),
# so we pin to a content digest. Bump deliberately by re-pulling :latest
# and copying the new digest in.

services:
  feldera:
    image: ghcr.io/feldera/pipeline-manager:latest@sha256:83632d620492f1d2a82348f775e0a734b1067f151556c7639478e1c0fabcd384
    container_name: session-lattice-feldera
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      RUST_LOG: info
      RUST_BACKTRACE: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/healthz || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    restart: unless-stopped
